<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>교회 시설 | 위드교회</title>
  <link rel="icon" href="../../src/logo.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="page-title">교회 시설</h1>
        <p class="page-subtitle">위드교회의 예배 공간과 시설을 소개합니다</p>

        <!-- 본당 -->
        <section class="facility">
          <header class="facility-header">
            <h2>본당</h2>
            <p>주일 예배(오전 11시)와 금요 철야 예배(오후 8시 30분)가 드려지는 2층 본당입니다.</p>
          </header>
          <div class="facility-grid facility-grid--2">
            <a class="facility-photo" href="../../src/location/본당1.jpeg" data-lightbox aria-label="본당 사진 1 확대">
              <img src="../../src/location/본당1.jpeg" alt="위드교회 본당 1" loading="lazy" />
            </a>
            <a class="facility-photo" href="../../src/location/본당2.jpeg" data-lightbox aria-label="본당 사진 2 확대">
              <img src="../../src/location/본당2.jpeg" alt="위드교회 본당 2" loading="lazy" />
            </a>
          </div>
        </section>

        <!-- 소그룹실 -->
        <section class="facility" id="small-groups">
          <header class="facility-header">
            <h2>소그룹실</h2>
            <p>어린이·청소년 예배와 소그룹 모임이 진행되는 공간입니다.</p>
            <ul class="facility-rooms">
              <li><span class="room-dot room-dot--yellow"></span>위드조이 (노랑방, 1층) — 키즈 1~5세</li>
              <li><span class="room-dot room-dot--pink"></span>위드드림 (핑크방, 1층) — 칠드런 6~10세</li>
              <li><span class="room-dot room-dot--green"></span>위드러브 (초록방, 1층) — 틴즈 11~16세</li>
            </ul>
          </header>
          <div class="facility-grid facility-grid--3">
            <a class="facility-photo" href="../../src/location/소그룹실2.jpeg" data-lightbox aria-label="소그룹실 2 확대">
              <img src="../../src/location/소그룹실2.jpeg" alt="소그룹실 2" loading="lazy" />
            </a>
            <a class="facility-photo" href="../../src/location/소그룹실1.jpeg" data-lightbox aria-label="소그룹실 1 확대">
              <img src="../../src/location/소그룹실1.jpeg" alt="소그룹실 1" loading="lazy" />
            </a>
            <a class="facility-photo" href="../../src/location/소그룹실3.jpeg" data-lightbox aria-label="소그룹실 3 확대">
              <img src="../../src/location/소그룹실3.jpeg" alt="소그룹실 3" loading="lazy" />
            </a>
          </div>
        </section>

        <!-- 교회전경 -->
        <section class="facility">
          <header class="facility-header">
            <h2>교회 전경</h2>
            <p>현대성우 2차 아파트 단지 내에 위치한 단독 건물입니다.<br />아파트 정문에서 경비실을 마주보고 오른쪽 길로 내려오시면 보입니다.</p>
          </header>
          <div class="facility-grid facility-grid--1">
            <a class="facility-photo facility-photo--wide" href="../../src/location/교회전경.jpeg" data-lightbox aria-label="교회 전경 확대">
              <img src="../../src/location/교회전경.jpeg" alt="위드교회 외부 전경" loading="lazy" />
            </a>
          </div>
        </section>
      </div>
    </section>

    <!-- Lightbox overlay -->
    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="사진 확대 보기">
      <button class="lightbox-close" type="button" aria-label="닫기">&times;</button>
      <img class="lightbox-img" alt="" />
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="../../assets/js/main.js"></script>
  <script>
    (function () {
      const lb = document.getElementById("lightbox");
      const lbImg = lb.querySelector(".lightbox-img");
      const lbClose = lb.querySelector(".lightbox-close");

      function open(href, alt) {
        lbImg.src = href;
        lbImg.alt = alt || "";
        lb.hidden = false;
        document.body.style.overflow = "hidden";
      }
      function close() {
        lb.hidden = true;
        lbImg.src = "";
        document.body.style.overflow = "";
      }

      document.querySelectorAll("[data-lightbox]").forEach((a) => {
        a.addEventListener("click", (e) => {
          e.preventDefault();
          open(a.href, a.querySelector("img")?.alt);
        });
      });
      lbClose.addEventListener("click", close);
      lb.addEventListener("click", (e) => { if (e.target === lb) close(); });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !lb.hidden) close(); });
    })();
  </script>
</body>
</html>
